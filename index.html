<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sistema LP</title>
<style>
body{font-family:Arial,system-ui;margin:0;background:#f3f4f6;color:#111827}
header{background:#111827;color:white;padding:16px}
main{max-width:1100px;margin:auto;padding:16px}
.card{background:white;border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 2px 8px #0001}
.big{font-size:18px;font-weight:900}
button{border:0;border-radius:12px;padding:12px;font-weight:900;cursor:pointer;background:#111827;color:white;margin-top:10px;width:100%}
button.secondary{background:#374151}
button.green{background:#166534}
button.red{background:#991b1b}
input,select,textarea{width:100%;box-sizing:border-box;padding:11px;border:1px solid #d1d5db;border-radius:10px;margin-top:5px;font-size:15px}
label{font-weight:800;display:block;margin-top:10px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.hidden{display:none}
.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-top:10px}
.week{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.day{background:#fff;border:1px solid #ddd;border-radius:12px;padding:8px;min-height:110px}
.day h4{margin:0 0 8px;font-size:14px}
.muted{font-size:13px;color:#6b7280}
.item{border-bottom:1px solid #e5e7eb;padding:8px 0}
@media(max-width:850px){.row,.row3,.week{grid-template-columns:1fr}}
</style>
</head>

<body>
<header>
  <h2>Sistema LP - Previdenciário</h2>
  <label>Usuário</label>
  <select id="responsavel">
    <option value="BRUNO">1 - BRUNO</option>
    <option value="PATRICIA">2 - PATRICIA</option>
    <option value="LORRAYNE">3 - LORRAYNE</option>
  </select>
</header>

<main>

<div class="card">
  <button onclick="toggle('cadastro')">CADASTRAR NOVO CLIENTE</button>
  <button onclick="toggle('agenda')" class="secondary">AGENDAMENTOS</button>
  <button onclick="toggle('busca')" class="secondary">BUSCAR CLIENTES</button>
</div>

<section id="cadastro" class="hidden card">
  <div class="big">1. Fechamento rápido</div>

  <label>Nome completo *</label>
  <input id="clienteNome">

  <div class="row">
    <div>
      <label>CPF *</label>
      <input id="clienteCpf" maxlength="14" oninput="mascaraCPF(this)">
      <div id="cpfMsg" class="muted"></div>
    </div>
    <div>
      <label>Data de nascimento *</label>
      <input id="clienteDataNascimentoISO" type="date">
    </div>
  </div>

  <div class="row">
    <div>
      <label>WhatsApp</label>
      <input id="whatsapp">
    </div>
    <div>
      <label>Nacionalidade</label>
      <input id="clienteNacionalidade" value="BRASILEIRA">
    </div>
  </div>

  <label>Estado civil</label>
  <select id="clienteEstadoCivil">
    <option value="">Selecione...</option>
    <option>SOLTEIRO(A)</option>
    <option>CASADO(A)</option>
    <option>DIVORCIADO(A)</option>
    <option>VIÚVO(A)</option>
    <option>UNIÃO ESTÁVEL</option>
  </select>

  <label>Endereço</label>
  <textarea id="clienteEndereco" rows="2"></textarea>

  <label>UF</label>
  <select id="clienteUF">
    <option>MT</option><option>GO</option><option>RO</option><option>SP</option><option>RJ</option>
    <option>AC</option><option>AL</option><option>AP</option><option>AM</option><option>BA</option>
    <option>CE</option><option>DF</option><option>ES</option><option>MA</option><option>MS</option>
    <option>MG</option><option>PA</option><option>PB</option><option>PR</option><option>PE</option>
    <option>PI</option><option>RN</option><option>RS</option><option>RR</option><option>SC</option>
    <option>SE</option><option>TO</option>
  </select>

  <div class="box">
    <div class="big">2. Benefícios e honorários</div>
    <div id="beneficiosArea"></div>
    <button onclick="addBeneficio()" class="secondary">+ ADICIONAR MAIS BENEFÍCIO</button>
  </div>

  <div class="box">
    <label>Forma de assinatura</label>
    <select id="formaAssinatura" onchange="toggleRogo()">
      <option value="MANUAL">MANUAL / IMPRESSA</option>
      <option value="D4SIGN">D4SIGN - ENVIO MANUAL</option>
    </select>

    <div id="rogoBox">
      <label>Assinatura a rogo?</label>
      <select id="assinaturaARogo">
        <option>NÃO</option>
        <option>SIM</option>
      </select>
    </div>
  </div>

  <button onclick="toggle('complementar')" class="secondary">COMPLEMENTAR CADASTRO DO CLIENTE</button>

  <div id="complementar" class="hidden box">
    <label>Acesso GOV</label>
    <input id="govAcesso">

    <div class="row">
      <div>
        <label>Está trabalhando?</label>
        <select id="estaTrabalhando"><option></option><option>SIM</option><option>NÃO</option></select>
      </div>
      <div>
        <label>Qualidade de segurado?</label>
        <select id="qualidadeSegurado"><option></option><option>SIM</option><option>NÃO</option><option>NÃO SEI / A APURAR</option></select>
      </div>
    </div>

    <label>Especialidade médica / doença</label>
    <select id="especialidadeMedica">
      <option></option><option>NEUROLÓGICA</option><option>PSIQUIÁTRICA</option><option>ORTOPÉDICA</option>
      <option>CÂNCER</option><option>DOENÇA DEGENERATIVA</option><option>VISUAL</option><option>AUTOIMUNE</option><option>OUTRA</option>
    </select>

    <label>Observação da doença</label>
    <textarea id="doencaObservacao" rows="2"></textarea>

    <div class="row">
      <div>
        <label>Possui laudo?</label>
        <select id="possuiLaudo"><option></option><option>SIM</option><option>NÃO</option></select>
      </div>
      <div>
        <label>Tempo do laudo</label>
        <select id="tempoLaudo">
          <option></option><option>PERMANENTE</option><option>10 DIAS</option><option>20 DIAS</option><option>30 DIAS</option>
          <option>60 DIAS</option><option>90 DIAS</option><option>120 DIAS</option><option>180 DIAS</option><option>OUTRO</option>
        </select>
      </div>
    </div>

    <label>Origem do cliente</label>
    <select id="origemCliente">
      <option></option><option>INDICAÇÃO</option><option>CLIENTE ANTIGO</option><option>GOOGLE</option>
      <option>INSTAGRAM</option><option>FACEBOOK</option><option>TRÁFEGO PAGO</option><option>OUTRO</option>
    </select>
  </div>

  <div class="box">
    <div class="big">3. Conferência e ação</div>
    <button onclick="confirmarAcao('cadastro_only')" class="secondary">SOMENTE CADASTRAR CLIENTE</button>
    <button onclick="confirmarAcao('cadastro_pdf')" class="green">CADASTRO E PDF</button>
    <button onclick="confirmarAcao('regenerar_documentos')" class="secondary">REGERAR DOCUMENTOS</button>
    <div id="statusCadastro" class="muted"></div>
  </div>
</section>

<section id="agenda" class="hidden card">
  <div class="big">Agendamentos</div>

  <div class="row3">
    <div>
      <label>Data</label>
      <input id="agendaData" type="date">
    </div>
    <div>
      <label>Hora</label>
      <input id="agendaHora" type="time">
    </div>
    <div>
      <label>Tipo</label>
      <select id="agendaTipo">
        <option>CONSULTA</option><option>PERÍCIA</option><option>DIVERSO</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div>
      <label>Nome</label>
      <input id="agendaNome">
    </div>
    <div>
      <label>CPF</label>
      <input id="agendaCpf" oninput="mascaraCPF(this)">
    </div>
  </div>

  <div class="row">
    <div>
      <label>Clínica</label>
      <select id="agendaClinica">
        <option></option><option>FEB</option><option>SÃO JUDAS TADEU</option><option>PREVIDAS</option><option>OUTRO</option>
      </select>
    </div>
    <div>
      <label>Especialidade</label>
      <select id="agendaEspecialidade">
        <option></option><option>ORTOPEDIA</option><option>PSIQUIATRIA</option><option>NEUROLOGIA</option>
        <option>OFTALMOLOGIA</option><option>ONCOLOGIA</option><option>OUTRA</option>
      </select>
    </div>
  </div>

  <label>Cliente vai pagar laudo?</label>
  <select id="agendaVaiPagarLaudo"><option></option><option>SIM</option><option>NÃO</option></select>

  <label>Observação</label>
  <textarea id="agendaObs" rows="2"></textarea>

  <button onclick="salvarAgenda()" class="green">SALVAR AGENDAMENTO</button>

  <div class="box">
    <button onclick="carregarSemana()" class="secondary">ATUALIZAR AGENDA DA SEMANA</button>
    <div id="semana" class="week"></div>
  </div>
</section>

<section id="busca" class="hidden card">
  <div class="big">Buscar clientes</div>

  <div class="row">
    <div>
      <label>Buscar por CPF</label>
      <input id="buscaCpf" oninput="mascaraCPF(this)">
      <button onclick="buscarCpf()">BUSCAR CPF</button>
    </div>
    <div>
      <label>Buscar por nome</label>
      <input id="buscaNome">
      <button onclick="buscarNome()">BUSCAR NOME</button>
    </div>
  </div>

  <div id="resultadoBusca" class="box"></div>

  <div class="box">
    <button onclick="listarClientes('alfabetica')" class="secondary">LISTA COMPLETA - ORDEM ALFABÉTICA</button>
    <button onclick="listarClientes('cadastro')" class="secondary">LISTA COMPLETA - ORDEM DE CADASTRO</button>
    <div id="listaClientes"></div>
  </div>

  <div class="box">
    <div class="big">Financeiro do cliente</div>
    <label>CPF do cliente</label>
    <input id="finCpf" oninput="mascaraCPF(this)">

    <label>Benefício</label>
    <select id="finBeneficio">
      <option>BENEFÍCIO POR INCAPACIDADE</option><option>AUXÍLIO-ACIDENTE</option><option>BPC</option>
      <option>SALÁRIO-MATERNIDADE</option><option>APOSENTADORIA</option><option>PENSÃO POR MORTE</option>
    </select>

    <div class="row3">
      <div>
        <label>Tipo de valor</label>
        <select id="finTipoValor">
          <option>PARCELA DO BENEFÍCIO</option><option>RETROATIVO TOTAL</option><option>PAGAMENTO ÚNICO</option><option>OUTRO</option>
        </select>
      </div>
      <div>
        <label>Nº parcela</label>
        <input id="finNumeroParcela" type="number">
      </div>
      <div>
        <label>Valor recebido/concedido</label>
        <input id="finValor" type="number" step="0.01">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Data prevista pagamento</label>
        <input id="finDataPrevista" type="date">
      </div>
      <div>
        <label>Data pagamento</label>
        <input id="finDataPagamento" type="date">
      </div>
    </div>

    <label>Status pagamento</label>
    <select id="finStatus"><option>PENDENTE</option><option>PAGO</option><option>ATRASADO</option></select>

    <label>Observação</label>
    <textarea id="finObs"></textarea>

    <button onclick="lancarFinanceiro()" class="green">LANÇAR FINANCEIRO</button>
    <button onclick="verFinanceiro()" class="secondary">VER FINANCEIRO DO CLIENTE</button>
    <div id="finResultado"></div>
  </div>
</section>

</main>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx5GYE_QlsQ7E7z_L8HDsUymFFRtOad8WAWYfQDAW9nS8tNqIF4liF0tpA79U-Uek26dQ/exec";
const TOKEN = "BRUNO-SEGURANCA-2026";
let benefCount = 0;

function $(id){return document.getElementById(id)}
function toggle(id){$(id).classList.toggle("hidden")}
function digits(v){return String(v||"").replace(/\D/g,"")}
function resp(){return $("responsavel").value}

function mascaraCPF(el){
  let v=digits(el.value).slice(0,11);
  v=v.replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2");
  el.value=v;
  if(el.id==="clienteCpf"){
    $("cpfMsg").textContent = digits(v).length===11 ? (validarCPF(v) ? "CPF válido" : "CPF inválido") : "";
  }
}

function validarCPF(cpf){
  cpf=digits(cpf);
  if(cpf.length!==11 || /^(\d)\1+$/.test(cpf)) return false;
  let soma=0, resto;
  for(let i=0;i<9;i++) soma+=parseInt(cpf[i])*(10-i);
  resto=(soma*10)%11; if(resto===10) resto=0;
  if(resto!==parseInt(cpf[9])) return false;
  soma=0;
  for(let i=0;i<10;i++) soma+=parseInt(cpf[i])*(11-i);
  resto=(soma*10)%11; if(resto===10) resto=0;
  return resto===parseInt(cpf[10]);
}

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    window[cb]=data=>{delete window[cb]; s.remove(); resolve(data)};
    const s=document.createElement("script");
    s.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    s.onerror=()=>reject("erro");
    document.body.appendChild(s);
  });
}

function post(payload, msgEl){
  payload.token=TOKEN;
  return fetch(WEBAPP_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)})
    .then(()=>{ if(msgEl) msgEl.textContent="✅ Enviado. Confira planilha/Drive."; });
}

function addBeneficio(valor="BENEFÍCIO POR INCAPACIDADE"){
  if(benefCount>=4) return alert("Limite de 4 benefícios.");
  const i=benefCount++;
  const div=document.createElement("div");
  div.className="box";
  div.id="benef_"+i;
  div.innerHTML=`
    <label>Benefício ${i+1}</label>
    <select id="beneficio_${i}" onchange="renderHon(${i})">
      <option>BENEFÍCIO POR INCAPACIDADE</option>
      <option>AUXÍLIO-ACIDENTE</option>
      <option>BPC</option>
      <option>SALÁRIO-MATERNIDADE</option>
      <option>APOSENTADORIA</option>
      <option>PENSÃO POR MORTE</option>
    </select>
    <div id="hon_${i}"></div>
    <button class="red" onclick="document.getElementById('benef_${i}').remove()">REMOVER</button>`;
  $("beneficiosArea").appendChild(div);
  $("beneficio_"+i).value=valor;
  renderHon(i);
}

function renderHon(i){
  const b=$("beneficio_"+i).value;
  const box=$("hon_"+i);
  if(b.includes("INCAPACIDADE")){
    box.innerHTML=`
      <div class="row3">
        <div><label>% inicial</label><input id="percInicial_${i}" value="30" type="number"></div>
        <div><label>Nº parcelas iniciais</label><input id="numParcelasIniciais_${i}" value="8" type="number"></div>
        <div><label>% após 8 parcelas</label><input id="percAposIniciais_${i}" value="15" type="number"></div>
      </div>`;
  } else if(b.includes("MATERNIDADE")){
    box.innerHTML=`
      <div class="row">
        <div><label>% maternidade</label><input id="percMaternidade_${i}" value="30" type="number"></div>
        <div><label>Nº parcelas</label><input id="numParcelasMaternidade_${i}" value="4" type="number"></div>
      </div>`;
  } else {
    box.innerHTML=`
      <div class="row">
        <div><label>% retroativo</label><input id="percRetroativo_${i}" value="45" type="number"></div>
        <div><label>Nº parcelas integrais</label><input id="numPrimeirasParcelasIntegrais_${i}" value="6" type="number"></div>
      </div>`;
  }
}

function honorarios(){
  const itens=[];
  document.querySelectorAll("[id^='benef_']").forEach(card=>{
    const i=card.id.split("_")[1];
    const b=$("beneficio_"+i)?.value;
    if(!b) return;
    const item={beneficio:b};
    if(b.includes("INCAPACIDADE")){
      item.percInicial=+$("percInicial_"+i).value;
      item.numParcelasIniciais=+$("numParcelasIniciais_"+i).value;
      item.percAposIniciais=+$("percAposIniciais_"+i).value;
    } else if(b.includes("MATERNIDADE")){
      item.percMaternidade=+$("percMaternidade_"+i).value;
      item.numParcelasMaternidade=+$("numParcelasMaternidade_"+i).value;
    } else {
      item.percRetroativo=+$("percRetroativo_"+i).value;
      item.numPrimeirasParcelasIntegrais=+$("numPrimeirasParcelasIntegrais_"+i).value;
    }
    itens.push(item);
  });
  return itens;
}

function toggleRogo(){
  $("rogoBox").style.display = $("formaAssinatura").value==="D4SIGN" ? "none" : "block";
  if($("formaAssinatura").value==="D4SIGN") $("assinaturaARogo").value="NÃO";
}

function payloadBase(action){
  return {
    action,
    responsavel: resp(),
    clienteNome: $("clienteNome").value,
    clienteCpf: digits($("clienteCpf").value),
    clienteDataNascimentoISO: $("clienteDataNascimentoISO").value,
    whatsapp: digits($("whatsapp").value),
    clienteNacionalidade: $("clienteNacionalidade").value,
    clienteEstadoCivil: $("clienteEstadoCivil").value,
    clienteEndereco: $("clienteEndereco").value,
    clienteUF: $("clienteUF").value,
    govAcesso: $("govAcesso").value,
    honorariosItens: honorarios(),
    formaAssinatura: $("formaAssinatura").value,
    assinaturaARogo: $("assinaturaARogo").value,
    especialidadeMedica: $("especialidadeMedica").value,
    doencaObservacao: $("doencaObservacao").value,
    possuiLaudo: $("possuiLaudo").value,
    tempoLaudo: $("tempoLaudo").value,
    qualidadeSegurado: $("qualidadeSegurado").value,
    estaTrabalhando: $("estaTrabalhando").value,
    origemCliente: $("origemCliente").value,
    local: "Várzea Grande/MT",
    data: new Date().toLocaleDateString("pt-BR")
  };
}

function confirmarAcao(action){
  const cpf=digits($("clienteCpf").value);
  if(!$("clienteNome").value || !cpf || !$("clienteDataNascimentoISO").value) return alert("Preencha nome, CPF e data de nascimento.");
  if(!validarCPF(cpf)) return alert("CPF inválido.");

  const texto=`CONFIRA OS DADOS:\n\nNome: ${$("clienteNome").value}\nCPF: ${$("clienteCpf").value}\nNascimento: ${$("clienteDataNascimentoISO").value}\n\nConfirmar?`;
  if(!confirm(texto)) return;

  if(action==="cadastro_only" && !confirm("Contrato e procuração NÃO serão gerados. Confirmar somente cadastro?")) return;
  $("statusCadastro").textContent="Enviando...";
  post(payloadBase(action), $("statusCadastro"));
}

function salvarAgenda(){
  const p={
    action:"agenda_create", token:TOKEN, responsavel:resp(),
    dataAgendamento:$("agendaData").value, hora:$("agendaHora").value, tipo:$("agendaTipo").value,
    nome:$("agendaNome").value, cpf:digits($("agendaCpf").value),
    clinica:$("agendaClinica").value, especialidade:$("agendaEspecialidade").value,
    vaiPagarLaudo:$("agendaVaiPagarLaudo").value, observacao:$("agendaObs").value
  };
  post(p);
  alert("Agendamento enviado.");
}

function mondayISO(){
  const d=new Date(); const day=d.getDay(); const diff=d.getDate()-day+(day===0?-6:1);
  d.setDate(diff);
  return d.toISOString().slice(0,10);
}

async function carregarSemana(){
  const inicio=mondayISO();
  const r=await jsonp(`${WEBAPP_URL}?action=agenda&inicio=${inicio}&dias=6`);
  const dias=["SEG","TER","QUA","QUI","SEX","SAB"];
  $("semana").innerHTML="";
  for(let i=0;i<6;i++){
    const d=new Date(inicio+"T00:00:00"); d.setDate(d.getDate()+i);
    const iso=d.toISOString().slice(0,10);
    const box=document.createElement("div"); box.className="day";
    box.innerHTML=`<h4>${dias[i]} - ${d.toLocaleDateString("pt-BR").slice(0,5)}</h4>`;
    (r.items||[]).filter(x=>x.DataAgendamento===iso).forEach(a=>{
      box.innerHTML+=`<div class="muted">${a.Hora||""} ${a.Nome||""}<br>${a.Tipo||""} ${a.Clinica||""}</div>`;
    });
    $("semana").appendChild(box);
  }
}

async function buscarCpf(){
  const cpf=digits($("buscaCpf").value);
  const r=await jsonp(`${WEBAPP_URL}?action=lookup&cpf=${cpf}`);
  if(!r.found){$("resultadoBusca").innerHTML="Não encontrado.";return;}
  renderCliente(r.data);
}

async function buscarNome(){
  const q=$("buscaNome").value;
  const r=await jsonp(`${WEBAPP_URL}?action=search_name&q=${encodeURIComponent(q)}`);
  $("resultadoBusca").innerHTML=(r.items||[]).map(c=>`
    <div class="item"><b>${c.Nome}</b><br>CPF: ${c.CPF}<br>
    <button onclick="carregarCliente('${c.CPF}')">ABRIR / EDITAR</button></div>`).join("");
}

async function carregarCliente(cpf){
  const r=await jsonp(`${WEBAPP_URL}?action=lookup&cpf=${digits(cpf)}`);
  if(r.found) renderCliente(r.data);
}

function renderCliente(c){
  $("resultadoBusca").innerHTML=`
    <b>${c.Nome}</b><br>
    CPF: ${c.CPF}<br>
    Nascimento: ${c.DataNascimento||""}<br>
    WhatsApp: ${c.WhatsApp||""}<br>
    Benefícios: ${c.Beneficios||""}<br>
    Resultado: ${c.ResultadoProcesso||""}<br>
    <button onclick='preencher(${JSON.stringify(c).replace(/'/g,"")})'>CARREGAR NO FORMULÁRIO / EDITAR</button>
    ${c.LinkPDF?`<button onclick="window.open('${c.LinkPDF}')">ABRIR PDF</button>`:""}
  `;
  $("finCpf").value=c.CPF;
}

function preencher(c){
  $("clienteNome").value=c.Nome||"";
  $("clienteCpf").value=c.CPF||"";
  mascaraCPF($("clienteCpf"));
  $("clienteDataNascimentoISO").value=c.DataNascimento||"";
  $("whatsapp").value=c.WhatsApp||"";
  $("clienteNacionalidade").value=c.Nacionalidade||"BRASILEIRA";
  $("clienteEstadoCivil").value=c.EstadoCivil||"";
  $("clienteEndereco").value=c.Endereco||"";
  $("clienteUF").value=c.UF||"MT";
  $("govAcesso").value=c.AcessoGOV||"";
  $("formaAssinatura").value=c.FormaAssinatura||"MANUAL";
  $("assinaturaARogo").value=c.AssinaturaARogo||"NÃO";
  toggleRogo();
  document.getElementById("cadastro").classList.remove("hidden");
}

async function listarClientes(ordem){
  const r=await jsonp(`${WEBAPP_URL}?action=listar_clientes&ordem=${ordem}`);
  $("listaClientes").innerHTML=(r.items||[]).map(c=>`<div class="item"><b>${c.Nome}</b><br>CPF: ${c.CPF}</div>`).join("");
}

function lancarFinanceiro(){
  const p={
    action:"financeiro_lancar", token:TOKEN, responsavel:resp(),
    clienteCpf:digits($("finCpf").value),
    beneficio:$("finBeneficio").value,
    tipoValor:$("finTipoValor").value,
    numeroParcela:$("finNumeroParcela").value,
    valorBaseRecebido:$("finValor").value,
    dataPrevistaPagamento:$("finDataPrevista").value,
    dataPagamento:$("finDataPagamento").value,
    statusPagamento:$("finStatus").value,
    observacao:$("finObs").value,
    resultadoProcesso:"CONCEDIDO"
  };
  post(p);
  $("finResultado").innerHTML="✅ Lançamento enviado. Confira a aba FINANCEIRO.";
}

async function verFinanceiro(){
  const cpf=digits($("finCpf").value);
  const r=await jsonp(`${WEBAPP_URL}?action=financeiro_cliente&cpf=${cpf}`);
  const d=r.data||{};
  const res=d.resumo||{};
  $("finResultado").innerHTML=`
    <div class="box">
    Total recebido cliente: R$ ${(res.TotalRecebidoCliente||0).toFixed(2)}<br>
    Total honorários: R$ ${(res.TotalHonorarios||0).toFixed(2)}<br>
    Total pago: R$ ${(res.TotalPago||0).toFixed(2)}<br>
    Saldo pendente: R$ ${(res.SaldoPendente||0).toFixed(2)}
    </div>
    ${(d.items||[]).map(i=>`<div class="item">${i.Beneficio} - ${i.TipoValor} - R$ ${i.ValorHonorarioCalculado}</div>`).join("")}
  `;
}

document.addEventListener("DOMContentLoaded",()=>{
  addBeneficio();
  $("agendaData").value=new Date().toISOString().slice(0,10);
  carregarSemana();
  toggleRogo();
});
</script>
</body>
