<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CRM Previdenciário BRC</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f5f5f5;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 8px;
  max-width: 1200px;
  margin: auto;
}

input, select, button {
  padding: 8px;
  margin: 5px;
  width: 100%;
}

button {
  cursor: pointer;
}

.beneficio {
  border: 1px solid #ddd;
  padding: 10px;
  margin-top: 10px;
}

.result {
  background: #eee;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>CRM PREVIDENCIÁRIO BRC</h2>

<!-- USUÁRIO -->
<select id="usuario">
  <option>BRUNO</option>
  <option>PATRICIA</option>
  <option>LORRAYNE</option>
</select>

<hr>

<!-- CADASTRO -->
<h3>Cadastro</h3>

<input id="nome" placeholder="Nome Completo">
<input id="cpf" placeholder="CPF">
<input id="nascimento" placeholder="Data Nascimento (DD/MM/AAAA)">
<input id="whatsapp" placeholder="WhatsApp">

<select id="estadoCivil">
  <option>Solteiro(a)</option>
  <option>Casado(a)</option>
</select>

<input id="endereco" placeholder="Endereço">
<input id="uf" placeholder="UF">

<hr>

<h3>Benefícios</h3>

<div id="beneficios"></div>

<button onclick="addBeneficio()">+ ADICIONAR BENEFÍCIO</button>

<hr>

<button onclick="salvar()">SALVAR CLIENTE</button>

<hr>

<!-- BUSCA -->
<h3>Buscar Cliente</h3>

<input id="busca" placeholder="Nome ou CPF">
<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwPcSfJ1NK9qZB_LQYOJG1lgnOsGCuZaGH3ktw3NkgAz-18kWyOZfGUF9QhWm-wRzz6Dw/exec";

// =========================
// BENEFÍCIOS DINÂMICOS
// =========================
function addBeneficio() {
  const div = document.createElement("div");
  div.className = "beneficio";

  div.innerHTML = `
    <select class="tipo">
      <option>Benefício por Incapacidade</option>
      <option>Aposentadoria</option>
      <option>BPC</option>
    </select>

    <input class="percentual" placeholder="% Honorários">
  `;

  document.getElementById("beneficios").appendChild(div);
}

// =========================
// SALVAR CLIENTE
// =========================
function salvar() {

  const beneficios = [];
  document.querySelectorAll(".beneficio").forEach(b => {
    beneficios.push({
      tipo: b.querySelector(".tipo").value,
      percentual: b.querySelector(".percentual").value
    });
  });

  if (beneficios.length === 0) {
    alert("Adicione pelo menos um benefício");
    return;
  }

  const payload = {
    action: "salvarCliente",
    nome: document.getElementById("nome").value,
    cpf: document.getElementById("cpf").value,
    nascimento: document.getElementById("nascimento").value,
    whatsapp: document.getElementById("whatsapp").value,
    estadoCivil: document.getElementById("estadoCivil").value,
    endereco: document.getElementById("endereco").value,
    uf: document.getElementById("uf").value,
    beneficios: beneficios,
    responsavel: document.getElementById("usuario").value
  };

  fetch(API, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(payload)
  });

  alert("Cliente salvo com sucesso");
}

// =========================
// BUSCAR CLIENTE (JSONP)
// =========================
function buscar() {
  const q = document.getElementById("busca").value;

  const script = document.createElement("script");
  script.src = API + "?action=buscar&q=" + q + "&callback=render";
  document.body.appendChild(script);
}

function render(data) {
  const div = document.getElementById("resultado");
  div.innerHTML = "";

  data.forEach(c => {
    const el = document.createElement("div");
    el.className = "result";
    el.innerHTML = c.nome + " - " + c.cpf + " - " + c.status;
    div.appendChild(el);
  });
}

</script>

</body>
</html>
