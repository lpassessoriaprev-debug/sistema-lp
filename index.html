<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema LP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#111;color:#fff;padding:15px}
main{padding:15px;max-width:600px;margin:auto}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
button{width:100%;padding:12px;margin-top:10px;border:0;border-radius:8px;font-weight:bold;background:#111;color:#fff}
input,select{width:100%;padding:10px;margin-top:5px;margin-bottom:10px;border:1px solid #ccc;border-radius:8px}
</style>
</head>

<body>

<header>
<h2>Sistema LP</h2>
</header>

<main>

<div class="card">
<h3>Cadastro rápido</h3>

<label>Nome</label>
<input id="nome">

<label>CPF</label>
<input id="cpf">

<label>Data nascimento</label>
<input id="nascimento" type="date">

<label>WhatsApp</label>
<input id="whatsapp">

<label>Benefício</label>
<select id="beneficio">
<option>BENEFÍCIO POR INCAPACIDADE</option>
<option>AUXÍLIO-ACIDENTE</option>
<option>BPC</option>
<option>SALÁRIO-MATERNIDADE</option>
<option>APOSENTADORIA</option>
</select>

<button onclick="enviar()">CADASTRAR + GERAR PDF</button>

<div id="status"></div>
</div>

</main>

<script>

const URL = "https://script.google.com/macros/s/AKfycbx5GYE_QlsQ7E7z_L8HDsUymFFRtOad8WAWYfQDAW9nS8tNqIF4liF0tpA79U-Uek26dQ/exec";

function enviar(){

const dados = {
action:"cadastro_pdf",
token:"BRUNO-SEGURANCA-2026",

clienteNome:document.getElementById("nome").value,
clienteCpf:document.getElementById("cpf").value.replace(/\D/g,""),
clienteDataNascimentoISO:document.getElementById("nascimento").value,
whatsapp:document.getElementById("whatsapp").value.replace(/\D/g,""),

beneficio:document.getElementById("beneficio").value,

formaAssinatura:"MANUAL",
assinaturaARogo:"NÃO",
responsavel:"BRUNO",

local:"Várzea Grande/MT",
data:new Date().toLocaleDateString()
};

document.getElementById("status").innerText="Enviando...";

fetch(URL,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"text/plain"
},
body:JSON.stringify(dados)
})
.then(r => r.json())
.then(r => {
  if(r.ok){
    document.getElementById("status").innerText = "✔ Cadastro realizado com sucesso!";
  } else {
    document.getElementById("status").innerText = "❌ Erro: " + r.error;
  }
})
.catch(e=>{
  document.getElementById("status").innerText = "Erro conexão: " + e;
});
.then(()=>{
document.getElementById("status").innerText="✔ Cadastro enviado! Confira Drive e planilha.";
});

}

</script>

</body>
</html>
